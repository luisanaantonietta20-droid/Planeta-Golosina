<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Catálogo — Distribuidora</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;background:#f0f2f5;color:#111;-webkit-font-smoothing:antialiased;overflow:hidden}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* ── PANTALLA SELECTOR ── */
#screen-selector{position:fixed;inset:0;background:#f0f2f5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;z-index:100;padding:40px 24px}
#screen-selector.hidden{display:none}
.sel-logo{font-size:56px;margin-bottom:8px}
.sel-title{font-size:28px;font-weight:900;letter-spacing:-.03em;margin-bottom:4px}
.sel-sub{font-size:15px;color:#888;font-weight:500;margin-bottom:32px}
.sel-section{width:100%;max-width:480px;margin-bottom:24px}
.sel-section h3{font-size:12px;font-weight:700;color:#bbb;letter-spacing:.1em;margin-bottom:10px}
.sel-list{display:flex;flex-direction:column;gap:8px;max-height:200px;overflow-y:auto}
.sel-btn{width:100%;padding:14px 18px;border-radius:14px;border:2px solid #e8e8e8;background:#fff;font-size:15px;font-weight:700;color:#111;cursor:pointer;transition:all .15s;text-align:left;display:flex;align-items:center;gap:12px}
.sel-btn:hover{border-color:#111;background:#f9f9f9}
.sel-btn.selected{border-color:#6c47ff;background:#f5f0ff;color:#6c47ff}
.sel-avatar{width:36px;height:36px;border-radius:50%;background:#e8e8e8;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#555;flex-shrink:0}
.sel-btn.selected .sel-avatar{background:#6c47ff;color:#fff}
.btn-continuar{width:100%;max-width:480px;padding:16px;border-radius:14px;border:none;background:#111;color:#fff;font-size:16px;font-weight:800;cursor:pointer;transition:opacity .15s;margin-top:8px}
.btn-continuar:hover{opacity:.85}
.btn-continuar:disabled{opacity:.3;cursor:not-allowed}
.sel-input{width:100%;padding:12px 16px;border-radius:12px;border:2px solid #e8e8e8;background:#fff;font-size:15px;font-family:'Inter',sans-serif;color:#111;outline:none;transition:border-color .15s;margin-bottom:10px}
.sel-input:focus{border-color:#6c47ff}

/* ── PANTALLA CLIENTE ── */
#screen-cliente{position:fixed;inset:0;background:#f0f2f5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;z-index:99;padding:40px 24px}
#screen-cliente.hidden{display:none}

/* ── APP PRINCIPAL ── */
#app{display:flex;height:100vh;overflow:hidden}
#app.hidden{display:none}

/* SIDEBAR CATEGORÍAS */
aside{width:200px;background:#fff;border-right:1px solid #ebebeb;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;padding-bottom:16px}
.app-brand{padding:20px 16px 16px;border-bottom:1px solid #f0f0f0;margin-bottom:8px}
.app-brand-logo{font-size:28px;margin-bottom:2px}
.app-brand-name{font-size:13px;font-weight:800;color:#111}
.app-brand-cliente{font-size:11px;color:#6c47ff;font-weight:600;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cat-label{font-size:10px;font-weight:700;color:#bbb;letter-spacing:.1em;padding:8px 16px 6px}
.cat-btn{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;color:#666;transition:all .15s;border:none;background:none;width:calc(100% - 12px);margin:0 6px;text-align:left}
.cat-btn:hover{background:#f5f5f5;color:#111}
.cat-btn.active{background:#111;color:#fff}
.cat-btn .cat-n{margin-left:auto;font-size:11px;padding:2px 7px;border-radius:99px;background:rgba(255,255,255,.18)}
.cat-btn:not(.active) .cat-n{background:#f0f0f0;color:#888}
.sidebar-vendedor{margin-top:auto;padding:14px 16px;border-top:1px solid #f0f0f0;font-size:11px;color:#aaa;font-weight:500}
.sidebar-vendedor strong{display:block;color:#111;font-size:12px;margin-bottom:2px}
.btn-cambiar{font-size:11px;color:#ff3b3b;font-weight:700;border:none;background:none;cursor:pointer;padding:0;margin-top:4px}

/* MAIN */
main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* TOPBAR */
.topbar{padding:16px 24px;background:#fff;border-bottom:1px solid #ebebeb;display:flex;align-items:center;gap:14px;flex-shrink:0}
.topbar-search{flex:1;position:relative}
.topbar-search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#bbb;width:17px;height:17px}
.topbar-search input{width:100%;padding:10px 12px 10px 38px;border-radius:10px;border:2px solid #e8e8e8;background:#f9f9f9;font-size:14px;font-family:'Inter',sans-serif;color:#111;outline:none;transition:all .15s}
.topbar-search input:focus{border-color:#6c47ff;background:#fff}
.topbar-search input::placeholder{color:#ccc}
.topbar-info{font-size:13px;color:#aaa;font-weight:500;white-space:nowrap}

/* GRID PRODUCTOS */
.products-area{flex:1;overflow-y:auto;padding:20px 24px}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}

/* PRODUCTO CARD */
.prod-card{background:#fff;border-radius:16px;overflow:hidden;border:2px solid #f0f0f0;transition:all .2s;cursor:default;animation:fadeUp .2s ease;display:flex;flex-direction:column}
.prod-card:hover{border-color:#e0e0e0;box-shadow:0 4px 20px rgba(0,0,0,.06)}
.prod-img-wrap{height:160px;background:#f7f7f7;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.prod-img{width:100%;height:100%;object-fit:contain}
.prod-img-placeholder{font-size:48px;opacity:.2}
.prod-body{padding:14px;display:flex;flex-direction:column;gap:8px;flex:1}
.prod-name{font-size:14px;font-weight:700;line-height:1.3;color:#111}
.prod-marca{font-size:11px;color:#aaa;font-weight:500}
.prod-price{font-size:18px;font-weight:900;color:#111;letter-spacing:-.02em}
.prod-unidad{font-size:11px;color:#bbb;font-weight:500;margin-top:-4px}
.prod-controls{display:flex;align-items:center;gap:6px;margin-top:4px}
.qty-btn{width:34px;height:34px;border-radius:10px;border:2px solid #e8e8e8;background:#fff;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;line-height:1;color:#444}
.qty-btn:hover{border-color:#111;background:#f5f5f5}
.qty-btn:active{transform:scale(.92)}
.qty-input{flex:1;text-align:center;border:2px solid #e8e8e8;border-radius:10px;padding:6px 4px;font-size:16px;font-weight:800;font-family:'Inter',sans-serif;color:#111;outline:none;transition:border-color .15s;min-width:0}
.qty-input:focus{border-color:#6c47ff}
.btn-agregar{width:100%;padding:10px;border-radius:10px;border:none;background:#111;color:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;margin-top:2px}
.btn-agregar:hover{background:#333}
.btn-agregar:active{transform:scale(.97)}
.btn-agregar.en-carrito{background:#6c47ff}

/* CARRITO BOTÓN FLOTANTE */
.cart-fab{position:fixed;bottom:28px;right:28px;background:#111;color:#fff;border:none;border-radius:20px;padding:14px 22px;font-size:15px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,.22);transition:all .2s;z-index:50}
.cart-fab:hover{background:#333;transform:translateY(-2px)}
.cart-fab.hidden{display:none}
.cart-badge{background:#6c47ff;color:#fff;font-size:12px;font-weight:900;padding:3px 9px;border-radius:99px}

/* PANEL CARRITO */
.cart-panel{position:fixed;inset:0;z-index:200;display:flex;justify-content:flex-end}
.cart-panel.hidden{display:none}
.cart-overlay{position:absolute;inset:0;background:rgba(0,0,0,.4)}
.cart-drawer{position:relative;width:420px;max-width:100%;background:#fff;display:flex;flex-direction:column;height:100%;animation:slideIn .2s ease;overflow:hidden}
.cart-hdr{padding:22px 24px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cart-hdr h2{font-size:20px;font-weight:900;letter-spacing:-.02em}
.btn-cart-close{width:36px;height:36px;border-radius:10px;border:none;background:#f5f5f5;cursor:pointer;font-size:18px;transition:background .15s}
.btn-cart-close:hover{background:#eee}
.cart-items{flex:1;overflow-y:auto;padding:16px 24px;display:flex;flex-direction:column;gap:10px}
.cart-item{background:#f9f9f9;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;animation:fadeUp .15s ease}
.cart-item-img{width:48px;height:48px;border-radius:8px;background:#fff;border:1px solid #f0f0f0;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.cart-item-img img{width:100%;height:100%;object-fit:contain}
.cart-item-img span{font-size:22px}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-size:13px;font-weight:700;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-item-sub{font-size:12px;color:#aaa;font-weight:500;margin-top:2px}
.cart-item-price{font-size:15px;font-weight:900;color:#111;flex-shrink:0}
.btn-cart-del{width:28px;height:28px;border-radius:8px;border:none;background:#fff0f0;color:#ff3b3b;cursor:pointer;font-size:14px;flex-shrink:0;transition:background .15s}
.btn-cart-del:hover{background:#ffd0d0}
.cart-footer{padding:20px 24px;border-top:1px solid #f0f0f0;flex-shrink:0}
.cart-total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.cart-total-label{font-size:14px;color:#888;font-weight:600}
.cart-total-num{font-size:26px;font-weight:900;letter-spacing:-.03em}
.cart-cliente-info{background:#f5f0ff;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:#6c47ff;font-weight:600}
.btn-finalizar{width:100%;padding:16px;border-radius:14px;border:none;background:#6c47ff;color:#fff;font-size:16px;font-weight:900;cursor:pointer;transition:all .15s;letter-spacing:-.01em}
.btn-finalizar:hover{background:#5538d8;transform:translateY(-1px)}
.btn-finalizar:active{transform:scale(.98)}
.btn-finalizar:disabled{opacity:.4;cursor:not-allowed;transform:none}
.cart-empty{padding:40px 24px;text-align:center;color:#bbb}
.cart-empty .icon{font-size:40px;margin-bottom:12px;opacity:.5}
.cart-empty p{font-size:14px;font-weight:500}

/* CONFIRMAR MODAL */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:300;padding:24px}
.confirm-overlay.hidden{display:none}
.confirm-box{background:#fff;border-radius:20px;padding:32px;max-width:380px;width:100%;text-align:center;animation:popIn .2s ease;box-shadow:0 24px 80px rgba(0,0,0,.2)}
.confirm-icon{font-size:52px;margin-bottom:12px}
.confirm-box h2{font-size:22px;font-weight:900;letter-spacing:-.02em;margin-bottom:8px}
.confirm-box p{font-size:14px;color:#888;line-height:1.6;margin-bottom:24px}
.confirm-total{font-size:32px;font-weight:900;color:#6c47ff;margin-bottom:24px;letter-spacing:-.03em}
.confirm-btns{display:flex;gap:10px}
.confirm-btns button{flex:1;padding:14px;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;transition:all .15s;border:none}
.btn-confirm-cancel{background:#f5f5f5;color:#555}
.btn-confirm-cancel:hover{background:#eee}
.btn-confirm-ok{background:#6c47ff;color:#fff}
.btn-confirm-ok:hover{background:#5538d8}
.btn-confirm-ok:disabled{opacity:.5;cursor:not-allowed}

/* ÉXITO */
.success-overlay{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:400;animation:fadeUp .3s ease}
.success-overlay.hidden{display:none}
.success-icon{font-size:80px;margin-bottom:16px;animation:popIn .4s ease}
.success-overlay h2{font-size:28px;font-weight:900;letter-spacing:-.03em;margin-bottom:8px}
.success-overlay p{font-size:16px;color:#888;margin-bottom:32px}
.btn-nuevo-pedido{padding:16px 32px;border-radius:14px;border:none;background:#111;color:#fff;font-size:16px;font-weight:800;cursor:pointer}

/* EMPTY STATE */
.empty-state{grid-column:1/-1;text-align:center;padding:60px 24px;color:#bbb}
.empty-state .icon{font-size:48px;opacity:.25;margin-bottom:14px}
.empty-state p{font-size:15px;font-weight:500}

/* TOAST */
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#111;color:#fff;border-radius:12px;padding:12px 20px;font-size:14px;font-weight:600;display:none;z-index:9999;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.2)}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;gap:12px}
.loading-overlay.hidden{display:none}
.loading-spinner{width:40px;height:40px;border:4px solid #f0f0f0;border-top-color:#6c47ff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:#888;font-weight:600}

/* ── HAMBURGUESA ── */
.ham-btn{width:44px;height:44px;border-radius:12px;border:2px solid #e8e8e8;background:#fff;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;flex-shrink:0;transition:border-color .15s}
.ham-btn:hover{border-color:#111}
.ham-btn span{display:block;width:18px;height:2px;background:#111;border-radius:2px;transition:all .2s}
.ham-overlay{position:fixed;inset:0;z-index:200;display:flex}
.ham-overlay.hidden{display:none}
.ham-overlay-bg{flex:1;background:rgba(0,0,0,.4)}
.ham-drawer{width:340px;max-width:90vw;background:#fff;display:flex;flex-direction:column;height:100%;overflow-y:auto;box-shadow:4px 0 32px rgba(0,0,0,.15)}
.ham-hdr{display:flex;align-items:center;justify-content:space-between;padding:20px;border-bottom:1px solid #f0f0f0;flex-shrink:0}
.ham-section-label{font-size:11px;font-weight:700;color:#bbb;letter-spacing:.1em;padding:16px 20px 8px}
.ham-list{display:flex;flex-direction:column;gap:6px;padding:0 12px;max-height:340px;overflow-y:auto}
.ham-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;border:2px solid #e8e8e8;background:#fff;cursor:pointer;transition:all .15s;text-align:left;width:100%}
.ham-item:hover{border-color:#111;background:#fafafa}
.ham-item.selected{border-color:#6c47ff;background:#f5f0ff}
.ham-avatar{width:38px;height:38px;border-radius:50%;background:#e8e8e8;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#555;flex-shrink:0}
.ham-item.selected .ham-avatar{background:#6c47ff;color:#fff}
.ham-item-info{flex:1;min-width:0}
.ham-item-name{font-size:14px;font-weight:700;color:#111}
.ham-item-sub{font-size:11px;color:#aaa;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* topbar con hamburguesa */
.topbar-left{display:flex;align-items:center;gap:10px}
.vendedor-badge{font-size:12px;font-weight:700;background:#111;color:#fff;padding:5px 12px;border-radius:99px;white-space:nowrap}
.cliente-badge{font-size:12px;font-weight:700;background:#f5f0ff;color:#6c47ff;padding:5px 12px;border-radius:99px;white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis}

@media(max-width:768px){
  /* OCULTAR sidebar en celular */
  aside{display:none}

  /* APP ocupa todo el ancho */
  #app{flex-direction:column;height:100vh}

  /* TOPBAR compacto */
  .topbar{padding:10px 12px;gap:8px;flex-wrap:nowrap}
  .topbar-left{gap:6px;min-width:0;flex-shrink:1;overflow:hidden}
  .vendedor-badge{font-size:11px;padding:4px 8px;white-space:nowrap;flex-shrink:0}
  .cliente-badge{font-size:11px;padding:4px 8px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .topbar-search{min-width:0}
  .topbar-search input{font-size:13px;padding:8px 10px 8px 34px}
  .topbar-info{display:none}

  /* GRID: 2 columnas en celular */
  .products-area{padding:10px}
  .products-grid{grid-template-columns:1fr 1fr;gap:8px}

  /* CARDS más compactas */
  .prod-img-wrap{height:110px}
  .prod-body{padding:8px;gap:5px}
  .prod-name{font-size:12px}
  .prod-marca{font-size:10px}
  .prod-price{font-size:14px}
  .prod-unidad{font-size:10px}
  .qty-btn{width:28px;height:28px;font-size:15px}
  .qty-input{font-size:13px;padding:4px 2px}
  .btn-agregar{padding:7px;font-size:12px}

  /* CARRITO FAB */
  .cart-fab{bottom:16px;right:16px;padding:12px 16px;font-size:14px;border-radius:16px}

  /* PANEL CARRITO full screen en celular */
  .cart-drawer{width:100%;max-width:100%}

  /* MENÚ HAMBURGUESA full screen en celular */
  .ham-drawer{width:100%;max-width:100%}

  /* CONFIRM BOX */
  .confirm-box{padding:24px 16px}
  .confirm-total{font-size:26px}
}

@media(max-width:380px){
  .products-grid{grid-template-columns:1fr 1fr;gap:6px}
  .prod-img-wrap{height:90px}
  .prod-name{font-size:11px}
  .prod-price{font-size:13px}
  .qty-btn{width:24px;height:24px;font-size:13px}
  .btn-agregar{font-size:11px}
  .vendedor-badge,.cliente-badge{display:none}
}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Cargando catálogo...</div>
</div>

<!-- MENÚ HAMBURGUESA -->
<div id="hamburger-menu" class="ham-overlay hidden">
  <div class="ham-drawer">
    <div class="ham-hdr">
      <div id="ham-title" style="font-size:17px;font-weight:800">Menú</div>
      <button class="btn-cart-close" onclick="cerrarMenu()">✕</button>
    </div>
    <!-- PASO 1: Elegir vendedor -->
    <div id="ham-step-vendedor">
      <div class="ham-section-label">VENDEDOR</div>
      <div class="ham-list" id="ham-lista-vendedores"></div>
      <div style="padding:16px 20px;border-top:1px solid #f0f0f0;margin-top:8px">
        <button class="btn-finalizar" style="background:#111" onclick="confirmarVendedor()">Confirmar vendedor →</button>
      </div>
    </div>
    <!-- PASO 2: Elegir cliente -->
    <div id="ham-step-cliente" style="display:none">
      <div class="ham-section-label">CLIENTE</div>
      <div style="padding:0 16px 10px">
        <input class="sel-input" type="text" placeholder="Buscar cliente..." oninput="filtrarClientes(this.value)" id="buscador-clientes">
      </div>
      <div class="ham-list" id="ham-lista-clientes"></div>
      <div style="padding:16px 20px;border-top:1px solid #f0f0f0;margin-top:8px;display:flex;gap:8px">
        <button class="btn-cancel" style="flex:1" onclick="volverAVendedor()">← Volver</button>
        <button class="btn-finalizar" style="flex:2" onclick="confirmarCliente()">Confirmar cliente →</button>
      </div>
    </div>
    <!-- Sesión activa -->
    <div id="ham-sesion" style="display:none">
      <div style="padding:20px">
        <div class="ham-section-label">SESIÓN ACTIVA</div>
        <div style="background:#f5f5f5;border-radius:12px;padding:14px 16px;margin-bottom:12px">
          <div style="font-size:12px;color:#aaa;font-weight:600;margin-bottom:4px">VENDEDOR</div>
          <div id="sesion-vendedor-nombre" style="font-size:16px;font-weight:800"></div>
        </div>
        <div style="background:#f5f0ff;border-radius:12px;padding:14px 16px;margin-bottom:20px">
          <div style="font-size:12px;color:#6c47ff;font-weight:600;margin-bottom:4px">CLIENTE ACTUAL</div>
          <div id="sesion-cliente-nombre" style="font-size:16px;font-weight:800;color:#111"></div>
          <div id="sesion-cliente-negocio" style="font-size:12px;color:#aaa;margin-top:2px"></div>
        </div>
        <button onclick="cambiarCliente()" style="width:100%;padding:12px;border-radius:10px;border:2px solid #e8e8e8;background:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px">Cambiar cliente</button>

<script>
// ── FIREBASE CONFIG ──
// ⚠ REEMPLAZÁ con la MISMA configuración que pusiste en el panel
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCX-9vGkRa4Li2Q21ZhtVSlXICnAVVQCBg",
  authDomain: "planeta-golosina.firebaseapp.com",
  projectId: "planeta-golosina",
  storageBucket: "planeta-golosina.firebasestorage.app",
  messagingSenderId: "818352702889",
  appId: "1:818352702889:web:59dffc4fccc14a941cf0b8"
};

let dbFS = null;
let firebaseOK = false;
try {
  firebase.initializeApp(FIREBASE_CONFIG);
  dbFS = firebase.firestore();
  firebaseOK = true;
} catch(e) { console.warn('Firebase no configurado:', e); }

// ── ESTADO ──
let productos = [];
let clientes = [];
let vendedores = []; // Se cargan desde Firebase

let estado = {
  vendedor: null,
  cliente: null,
  cat: 'todos',
  search: '',
  carrito: {},
};

const CATS = [
  {id:'todos',label:'Todos',icon:'◈'},
  {id:'gomitas',label:'Gomitas',icon:'🐻'},
  {id:'chocolates',label:'Chocolates',icon:'🍫'},
  {id:'galletas',label:'Galletas',icon:'🍪'},
  {id:'caramelos',label:'Caramelos',icon:'🍬'},
  {id:'chicles',label:'Chicles',icon:'🫧'},
  {id:'alfajores',label:'Alfajores',icon:'🟫'},
  {id:'snacks',label:'Snacks',icon:'🍿'},
  {id:'bebidas',label:'Bebidas',icon:'🥤'},
  {id:'otros',label:'Otros',icon:'📦'},
];

const fmt = n => Number(n).toLocaleString('es-AR');
const genId = () => 'p' + Math.random().toString(36).substr(2,9) + Date.now().toString(36);
function toast(msg) {
  const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',1800);
}

// ── MENÚ HAMBURGUESA ──
let _hamVendedorTemp = null;
let _hamClienteTemp = null;
let _clientesFiltrados = [];
let _hamPaso = 'vendedor'; // 'vendedor' | 'cliente' | 'sesion'

function abrirMenu() {
  document.getElementById('hamburger-menu').classList.remove('hidden');
  if (estado.vendedor) {
    _hamPaso = 'sesion';
    mostrarHamSesion();
  } else {
    _hamPaso = 'vendedor';
    mostrarHamVendedor();
  }
}

function cerrarMenu() {
  document.getElementById('hamburger-menu').classList.add('hidden');
  _hamVendedorTemp = null;
  _hamClienteTemp = null;
}

function mostrarHamVendedor() {
  document.getElementById('ham-step-vendedor').style.display = 'block';
  document.getElementById('ham-step-cliente').style.display = 'none';
  document.getElementById('ham-sesion').style.display = 'none';
  document.getElementById('ham-title').textContent = '¿Quién sos?';
  renderHamVendedores();
}

function mostrarHamCliente() {
  document.getElementById('ham-step-vendedor').style.display = 'none';
  document.getElementById('ham-step-cliente').style.display = 'block';
  document.getElementById('ham-sesion').style.display = 'none';
  document.getElementById('ham-title').textContent = 'Seleccioná el cliente';
  document.getElementById('buscador-clientes').value = '';
  filtrarClientes('');
}

function mostrarHamSesion() {
  document.getElementById('ham-step-vendedor').style.display = 'none';
  document.getElementById('ham-step-cliente').style.display = 'none';
  document.getElementById('ham-sesion').style.display = 'block';
  document.getElementById('ham-title').textContent = 'Sesión activa';
  document.getElementById('sesion-vendedor-nombre').textContent = estado.vendedor || '—';
  const c = estado.cliente;
  document.getElementById('sesion-cliente-nombre').textContent = c ? (c.nombre+' '+(c.apellido||'')).trim() : 'Sin cliente';
  document.getElementById('sesion-cliente-negocio').textContent = c?.negocio || '';
}

function renderHamVendedores() {
  const el = document.getElementById('ham-lista-vendedores');
  if (!vendedores.length) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:#bbb;font-size:13px">Sin vendedores cargados.<br>Agregalos desde el panel.</div>';
    return;
  }
  el.innerHTML = vendedores.map(v => `
    <button class="ham-item${_hamVendedorTemp?.id===v.id?' selected':''}" onclick="seleccionarHamVendedor('${v.id}')">
      <div class="ham-avatar">${(v.nombre||'?').substring(0,2).toUpperCase()}</div>
      <div class="ham-item-info">
        <div class="ham-item-name">${v.nombre}</div>
        <div class="ham-item-sub">🚗 ${v.patente||'Sin patente'} · 📞 ${v.telefono||'—'}</div>
      </div>
    </button>`).join('');
}

function seleccionarHamVendedor(id) {
  _hamVendedorTemp = vendedores.find(v=>v.id===id);
  renderHamVendedores();
}

function confirmarVendedor() {
  if (!_hamVendedorTemp) { toast('⚠ Seleccioná un vendedor'); return; }
  estado.vendedor = _hamVendedorTemp.nombre;
  actualizarBadges();
  mostrarHamCliente();
}

function filtrarClientes(q) {
  _clientesFiltrados = q
    ? clientes.filter(c=>((c.nombre||'')+(c.apellido||'')+(c.negocio||'')).toLowerCase().includes(q.toLowerCase()))
    : [...clientes];
  renderHamClientes();
}

function renderHamClientes() {
  const el = document.getElementById('ham-lista-clientes');
  if (!_clientesFiltrados.length) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:#bbb;font-size:13px">Sin coincidencias</div>';
    return;
  }
  el.innerHTML = _clientesFiltrados.map(c => `
    <button class="ham-item${_hamClienteTemp?.id===c.id?' selected':''}" onclick="seleccionarHamCliente('${c.id}')">
      <div class="ham-avatar" style="${_hamClienteTemp?.id===c.id?'background:#6c47ff;color:#fff':''}">${((c.nombre||'?')[0]+(c.apellido||'?')[0]).toUpperCase()}</div>
      <div class="ham-item-info">
        <div class="ham-item-name">${c.nombre} ${c.apellido||''}</div>
        <div class="ham-item-sub">🏪 ${c.negocio||'—'} · 📍 ${c.direccion||'—'}</div>
      </div>
    </button>`).join('');
}

function seleccionarHamCliente(id) {
  _hamClienteTemp = clientes.find(c=>c.id===id);
  renderHamClientes();
}

function confirmarCliente() {
  if (!_hamClienteTemp) { toast('⚠ Seleccioná un cliente'); return; }
  estado.cliente = _hamClienteTemp;
  estado.carrito = {};
  actualizarBadges();
  cerrarMenu();
  actualizarFab();
  renderSidebarCats();
  renderProductos();
  document.getElementById('sidebar-cliente-nombre').textContent = (estado.cliente.nombre+' '+(estado.cliente.apellido||'')).trim();
  document.getElementById('sidebar-vendedor-nombre').textContent = estado.vendedor;
}

function volverAVendedor() {
  _hamPaso = 'vendedor';
  mostrarHamVendedor();
}

function cambiarCliente() {
  _hamClienteTemp = null;
  estado.cliente = null;
  estado.carrito = {};
  actualizarBadges();
  actualizarFab();
  mostrarHamCliente();
}

function cerrarSesion() {
  estado.vendedor = null;
  estado.cliente = null;
  estado.carrito = {};
  _hamVendedorTemp = null;
  _hamClienteTemp = null;
  actualizarBadges();
  actualizarFab();
  mostrarHamVendedor();
}

function actualizarBadges() {
  const vEl = document.getElementById('topbar-vendedor');
  const cEl = document.getElementById('topbar-cliente');
  vEl.textContent = estado.vendedor || 'Sin vendedor';
  cEl.textContent = estado.cliente ? ((estado.cliente.nombre+' '+(estado.cliente.apellido||'')).trim()+' · '+estado.cliente.negocio) : 'Sin cliente';
}

function volverASelector() { cerrarSesion(); }

// ── SIDEBAR CATEGORÍAS ──
function renderSidebarCats() {
  const el = document.getElementById('sidebar-cats');
  el.innerHTML = CATS.map(c => {
    const n = c.id==='todos' ? productos.length : productos.filter(p=>p.cat===c.id).length;
    if (n===0 && c.id!=='todos') return '';
    return `<button class="cat-btn${estado.cat===c.id?' active':''}" onclick="setCategoria('${c.id}')">
      ${c.icon} ${c.label}
      <span class="cat-n">${n}</span>
    </button>`;
  }).join('');
}

function setCategoria(cat) {
  estado.cat = cat;
  estado.search = '';
  document.getElementById('search-input').value = '';
  renderSidebarCats();
  renderProductos();
}

// ── PRODUCTOS ──
function renderProductos() {
  let list = productos;
  if (estado.cat!=='todos') list = list.filter(p=>p.cat===estado.cat);
  const q = estado.search.toLowerCase();
  if (q) list = list.filter(p=>(p.nombre+p.marca+p.detalle).toLowerCase().includes(q));
  document.getElementById('topbar-info').textContent = `${list.length} producto${list.length!==1?'s':''}`;
  const grid = document.getElementById('products-grid');
  if (!list.length) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">${CATS.find(c=>c.id===estado.cat)?.icon||'📦'}</div><p>${q?'Sin resultados para "'+q+'"':'Sin productos en esta categoría'}</p></div>`;
    return;
  }
  grid.innerHTML = list.map(p=>renderProdCard(p)).join('');
}

function renderProdCard(p) {
  const qty = estado.carrito[p.id]?.cantidad || 0;
  const enCarrito = qty > 0;
  const cat = CATS.find(c=>c.id===p.cat);
  const imgHtml = p.foto
    ? `<img class="prod-img" src="${p.foto}" alt="" loading="lazy">`
    : `<div class="prod-img-placeholder">${cat?.icon||'📦'}</div>`;
  return `<div class="prod-card">
    <div class="prod-img-wrap">${imgHtml}</div>
    <div class="prod-body">
      <div class="prod-name">${p.nombre}</div>
      ${p.marca?`<div class="prod-marca">${p.marca}</div>`:''}
      <div class="prod-price">$${fmt(p.precio||0)}</div>
      ${p.unidad?`<div class="prod-unidad">${p.unidad}</div>`:''}
      <div class="prod-controls">
        <button class="qty-btn" onclick="cambiarCantidad('${p.id}',-1)">−</button>
        <input class="qty-input" type="number" min="0" value="${qty}" onchange="setCantidad('${p.id}',this.value)" onclick="this.select()">
        <button class="qty-btn" onclick="cambiarCantidad('${p.id}',1)">+</button>
      </div>
      <button class="btn-agregar${enCarrito?' en-carrito':''}" onclick="agregar('${p.id}')">
        ${enCarrito?'✓ En carrito':'Agregar'}
      </button>
    </div>
  </div>`;
}

function onSearch(val) {
  estado.search = val;
  renderProductos();
}

// ── CARRITO LÓGICA ──
function cambiarCantidad(id, delta) {
  const prod = productos.find(p=>p.id===id);
  if (!prod) return;
  const actual = estado.carrito[id]?.cantidad || 0;
  const nueva = Math.max(0, actual + delta);
  if (nueva===0) { delete estado.carrito[id]; }
  else { estado.carrito[id] = {producto:prod, cantidad:nueva}; }
  actualizarFab();
  // Actualizar solo el input y botón de esa card
  const inputs = document.querySelectorAll('.qty-input');
  const btns = document.querySelectorAll('.btn-agregar');
  const cards = document.querySelectorAll('.prod-card');
  let idx = -1;
  const lista = getListaFiltrada();
  lista.forEach((p,i)=>{ if(p.id===id) idx=i; });
  if(idx>=0 && inputs[idx]) {
    inputs[idx].value = nueva;
    if(btns[idx]) { btns[idx].className='btn-agregar'+(nueva>0?' en-carrito':''); btns[idx].textContent=nueva>0?'✓ En carrito':'Agregar'; }
  }
}

function setCantidad(id, val) {
  const prod = productos.find(p=>p.id===id);
  if (!prod) return;
  const n = Math.max(0, parseInt(val)||0);
  if (n===0) { delete estado.carrito[id]; }
  else { estado.carrito[id] = {producto:prod, cantidad:n}; }
  actualizarFab();
  const lista = getListaFiltrada();
  const idx = lista.findIndex(p=>p.id===id);
  const btns = document.querySelectorAll('.btn-agregar');
  if(idx>=0 && btns[idx]) { btns[idx].className='btn-agregar'+(n>0?' en-carrito':''); btns[idx].textContent=n>0?'✓ En carrito':'Agregar'; }
}

function agregar(id) {
  const prod = productos.find(p=>p.id===id);
  if (!prod) return;
  if (!estado.carrito[id]) {
    estado.carrito[id] = {producto:prod, cantidad:1};
    toast(`✓ ${prod.nombre} agregado`);
  }
  actualizarFab();
  renderProductos();
}

function getListaFiltrada() {
  let list = productos;
  if (estado.cat!=='todos') list = list.filter(p=>p.cat===estado.cat);
  const q = estado.search.toLowerCase();
  if (q) list = list.filter(p=>(p.nombre+p.marca+p.detalle).toLowerCase().includes(q));
  return list;
}

function actualizarFab() {
  const items = Object.values(estado.carrito);
  const totalItems = items.reduce((a,i)=>a+i.cantidad,0);
  const fab = document.getElementById('cart-fab');
  const badge = document.getElementById('cart-badge');
  badge.textContent = totalItems;
  if (totalItems>0) fab.classList.remove('hidden');
  else fab.classList.add('hidden');
}

function calcTotal() {
  return Object.values(estado.carrito).reduce((a,i)=>a+(i.producto.precio||0)*i.cantidad,0);
}

// ── PANEL CARRITO ──
function abrirCarrito() {
  document.getElementById('cart-panel').classList.remove('hidden');
  renderCarrito();
}
function cerrarCarrito() { document.getElementById('cart-panel').classList.add('hidden'); }

function renderCarrito() {
  const items = Object.values(estado.carrito);
  const itemsEl = document.getElementById('cart-items');
  const footerEl = document.getElementById('cart-footer');
  if (!items.length) {
    itemsEl.innerHTML = `<div class="cart-empty"><div class="icon">🛒</div><p>El carrito está vacío</p></div>`;
    footerEl.innerHTML = '';
    return;
  }
  const total = calcTotal();
  itemsEl.innerHTML = items.map(i => {
    const cat = CATS.find(c=>c.id===i.producto.cat);
    return `<div class="cart-item">
      <div class="cart-item-img">
        ${i.producto.foto?`<img src="${i.producto.foto}" alt="">`:`<span>${cat?.icon||'📦'}</span>`}
      </div>
      <div class="cart-item-info">
        <div class="cart-item-name">${i.producto.nombre}</div>
        <div class="cart-item-sub">${i.cantidad} × $${fmt(i.producto.precio||0)}</div>
      </div>
      <div class="cart-item-price">$${fmt((i.producto.precio||0)*i.cantidad)}</div>
      <button class="btn-cart-del" onclick="quitarDelCarrito('${i.producto.id}')">✕</button>
    </div>`;
  }).join('');
  footerEl.innerHTML = `
    <div class="cart-cliente-info">📦 Pedido para: <strong>${estado.cliente?.nombre||'—'}</strong></div>
    <div class="cart-total-row">
      <span class="cart-total-label">Total</span>
      <span class="cart-total-num">$${fmt(total)}</span>
    </div>
    <button class="btn-finalizar" onclick="abrirConfirm()">Finalizar pedido →</button>`;
}

function quitarDelCarrito(id) {
  delete estado.carrito[id];
  actualizarFab();
  renderCarrito();
  renderProductos();
}

// ── CONFIRMAR Y ENVIAR ──
function abrirConfirm() {
  const total = calcTotal();
  const items = Object.values(estado.carrito);
  document.getElementById('confirm-desc').textContent = `Cliente: ${estado.cliente?.nombre} · ${items.length} producto${items.length!==1?'s':''}`;
  document.getElementById('confirm-total').textContent = '$'+fmt(total);
  document.getElementById('confirm-overlay').classList.remove('hidden');
}
function cerrarConfirm() { document.getElementById('confirm-overlay').classList.add('hidden'); }

async function enviarPedido() {
  const btn = document.getElementById('btn-confirm-ok');
  btn.disabled = true;
  btn.textContent = 'Enviando...';
  const items = Object.values(estado.carrito).map(i=>({
    nombre: i.producto.nombre,
    cat: i.producto.cat,
    precio: i.producto.precio||0,
    cantidad: i.cantidad,
    subtotal: (i.producto.precio||0)*i.cantidad
  }));
  const total = calcTotal();
  const pedido = {
    cliente: estado.cliente?.nombre || '—',
    clienteId: estado.cliente?.id || '',
    vendedor: estado.vendedor || '—',
    fecha: new Date().toISOString(),
    estado: 'nuevo',
    total,
    items
  };
  try {
    if (firebaseOK) {
      await dbFS.collection('pedidos').add(pedido);
    } else {
      // Guardar local como fallback
      const pedidos = JSON.parse(localStorage.getItem('golosinas_pedidos')||'[]');
      pedidos.unshift({...pedido, id: genId()});
      localStorage.setItem('golosinas_pedidos', JSON.stringify(pedidos));
    }
    document.getElementById('confirm-overlay').classList.add('hidden');
    document.getElementById('cart-panel').classList.add('hidden');
    document.getElementById('success-desc').textContent = `Pedido de $${fmt(total)} para ${estado.cliente?.nombre} enviado correctamente.`;
    document.getElementById('success-overlay').classList.remove('hidden');
    estado.carrito = {};
    actualizarFab();
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '✓ Confirmar';
    toast('⚠ Error al enviar. Intentá de nuevo.');
    console.error(e);
  }
}

function nuevoPedido() {
  document.getElementById('success-overlay').classList.add('hidden');
  estado.cliente = null;
  estado.carrito = {};
  actualizarBadges();
  actualizarFab();
  renderSidebarCats();
  renderProductos();
  // Abrir menú para elegir nuevo cliente
  abrirMenu();
}

// ── CARGA INICIAL ──
async function init() {
  // Cargar productos
  try {
    if (!firebaseOK) throw new Error('sin firebase');
    const snap = await dbFS.collection('productos').get();
    productos = snap.docs.map(d=>({id:d.id,...d.data()}));
  } catch(e) {
    // Cargar desde localStorage si hay (si el panel está en el mismo dispositivo)
    try { const db=JSON.parse(localStorage.getItem('golosinas_admin')||'{}'); productos=db.prods||[]; } catch(e2){}
  }
  // Cargar clientes
  try {
    if (!firebaseOK) throw new Error('sin firebase');
    const snap = await dbFS.collection('clientes').get();
    clientes = snap.docs.map(d=>({id:d.id,...d.data()}));
    clientes.sort((a,b)=>((a.nombre||'')+(a.apellido||'')).localeCompare((b.nombre||'')+(b.apellido||'')));
  } catch(e) {
    try { const db=JSON.parse(localStorage.getItem('golosinas_admin')||'{}'); clientes=db.clientes||[]; } catch(e2){}
  }
  // Cargar vendedores
  try {
    if (!firebaseOK) throw new Error('sin firebase');
    const snapV = await dbFS.collection('vendedores').get();
    vendedores = snapV.docs.map(d=>({id:d.id,...d.data()}));
    vendedores.sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||''));
  } catch(e) {
    try { const db=JSON.parse(localStorage.getItem('golosinas_admin')||'{}'); vendedores=db.vendedores||[]; } catch(e2){}
  }
  _clientesFiltrados = [...clientes];
  // Mostrar app y abrir menú
  document.getElementById('app').classList.remove('hidden');
  renderSidebarCats();
  renderProductos();
  actualizarBadges();
  actualizarFab();
  document.getElementById('loading-overlay').classList.add('hidden');
  abrirMenu();
}
init();
</script>
