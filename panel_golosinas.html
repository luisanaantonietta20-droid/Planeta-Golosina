<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Panel Admin — Distribuidora</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;background:#f5f5f5;color:#111;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#f0f0f0}::-webkit-scrollbar-thumb{background:#ddd;border-radius:99px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes modalIn{from{opacity:0;transform:scale(.97) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes ldot{0%,80%,100%{transform:scale(0);opacity:.3}40%{transform:scale(1);opacity:1}}

#app-loader{position:fixed;inset:0;background:#f5f5f5;display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .3s ease}
#app-loader.hide{opacity:0;pointer-events:none}
.loader-dot{width:10px;height:10px;border-radius:50%;background:#111;margin:0 4px;animation:ldot .8s ease-in-out infinite}
.loader-dot:nth-child(2){animation-delay:.15s}
.loader-dot:nth-child(3){animation-delay:.3s}

#app{display:flex;height:100vh;overflow:hidden}

aside{width:220px;background:#fff;border-right:1px solid #ebebeb;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.brand{display:flex;align-items:center;gap:10px;padding:22px 20px 18px}
.brand-logo{width:40px;height:40px;object-fit:contain;border-radius:8px}
.brand-info{flex:1}
.brand-name{font-weight:800;font-size:14px;letter-spacing:-.01em}
.brand-sub{font-size:11px;color:#aaa;font-weight:500}
.brand-badge{background:#111;color:#e8ff47;font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;letter-spacing:.04em}
.sidebar-divider{height:1px;background:#f0f0f0;margin:0 16px 12px}
.sidebar-label{font-size:10px;font-weight:700;color:#bbb;letter-spacing:.1em;padding:0 20px 8px}
nav{padding:0 10px;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;color:#666;transition:all .15s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:#f5f5f5;color:#111}
.nav-item.active{background:#111;color:#fff}
.nav-item .nav-n{margin-left:auto;font-size:12px;padding:2px 8px;border-radius:99px;background:rgba(255,255,255,.15)}
.nav-item:not(.active) .nav-n{background:#f0f0f0;color:#888}
.sidebar-footer{margin-top:auto;padding:16px 20px;border-top:1px solid #f0f0f0}
.sidebar-footer p{font-size:11px;color:#bbb;font-weight:500}

main{flex:1;overflow-y:auto;background:#f5f5f5}
.page{padding:32px;display:flex;flex-direction:column;gap:22px;animation:fadeUp .2s ease}

.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px}
.page-title-group h1{font-size:26px;font-weight:800;letter-spacing:-.03em}
.page-title-group p{font-size:14px;color:#888;margin-top:4px;font-weight:500}
.hdr-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn-export{padding:10px 16px;border-radius:10px;border:2px solid #e8e8e8;background:#fff;color:#555;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-export:hover{border-color:#aaa;color:#111}
.btn-new{padding:10px 18px;border-radius:10px;border:none;background:#111;color:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn-new:hover{opacity:.85}
.btn-import{padding:10px 16px;border-radius:10px;border:2px solid #e8e8e8;background:#fff;color:#555;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-import:hover{border-color:#6c47ff;color:#6c47ff}

.stats-row{display:flex;gap:12px;flex-wrap:wrap}
.stat-card{background:#fff;border-radius:14px;padding:18px 22px;flex:1;min-width:120px;border:2px solid #f0f0f0}
.stat-num{font-size:28px;font-weight:900;letter-spacing:-.03em}
.stat-label{font-size:11px;color:#aaa;font-weight:600;margin-top:4px;letter-spacing:.04em}

.search-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.search-box{flex:1;position:relative;display:flex;align-items:center;min-width:200px}
.search-box svg{position:absolute;left:13px;color:#bbb;width:17px;height:17px}
.search-box input{width:100%;padding:11px 12px 11px 40px;border-radius:10px;border:2px solid #e8e8e8;background:#fff;font-size:14px;font-family:'Inter',sans-serif;color:#111;outline:none;transition:border-color .15s}
.search-box input:focus{border-color:#111}
.search-box input::placeholder{color:#ccc}
.sc{position:absolute;right:12px;background:none;border:none;color:#bbb;cursor:pointer;font-size:13px}
.filter-pills{display:flex;gap:7px;flex-wrap:wrap}
.filter-pill{padding:8px 14px;border-radius:99px;border:2px solid #e8e8e8;background:#fff;color:#666;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.filter-pill:hover{border-color:#aaa;color:#111}
.filter-pill.active{border-color:#111;background:#111;color:#fff}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}

.card{background:#fff;border-radius:14px;overflow:hidden;border:2px solid #f0f0f0;transition:border-color .2s,transform .2s;animation:fadeUp .2s ease;display:flex;flex-direction:column}
.card:hover{border-color:#e0e0e0;transform:translateY(-2px)}
.card-img-wrap{height:180px;background:#f7f7f7;display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;overflow:hidden}
.card-img{width:100%;height:100%;object-fit:contain;display:none}
.card-img.loaded{display:block}
.card-img-placeholder{display:flex;flex-direction:column;align-items:center;gap:6px}
.card-img-placeholder .icon{font-size:36px;opacity:.2}
.card-img-placeholder .txt{font-size:11px;color:#ccc;font-weight:700;letter-spacing:.06em}
.card-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.card-img-wrap:hover .card-overlay{opacity:1}
.card-overlay span{color:#fff;font-size:12px;font-weight:700;letter-spacing:.06em}
.card-body{padding:16px;flex:1;display:flex;flex-direction:column;gap:8px}
.card-row1{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.card-name{font-size:15px;font-weight:700;letter-spacing:-.01em;line-height:1.3}
.card-price{font-size:17px;font-weight:800;flex-shrink:0;color:#111}
.card-tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;background:#f5f5f5;color:#666}
.card-desc{font-size:13px;color:#999;line-height:1.5}
.card-footer{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid #f5f5f5;margin-top:auto}
.card-id{font-size:11px;color:#ccc;font-weight:600}
.card-actions{display:flex;gap:6px}
.btn-edit{padding:7px 14px;border-radius:8px;border:2px solid #e8e8e8;background:#fff;color:#555;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-edit:hover{border-color:#111;color:#111}
.btn-del{padding:7px 14px;border-radius:8px;border:2px solid transparent;background:#fff5f5;color:#ff3b3b;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-del.confirm{background:#ff3b3b;color:#fff}
.btn-del:hover:not(.confirm){background:#ffe5e5}

/* CLIENTES */
.clientes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.cliente-card{background:#fff;border-radius:14px;border:2px solid #f0f0f0;padding:20px;display:flex;flex-direction:column;gap:10px;transition:border-color .15s,transform .2s;animation:fadeUp .2s ease}
.cliente-card:hover{border-color:#e0e0e0;transform:translateY(-2px)}
.cliente-avatar{width:44px;height:44px;border-radius:50%;background:#e8f4ff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#1a73e8;flex-shrink:0}
.cliente-hdr{display:flex;align-items:center;gap:12px}
.cliente-info{flex:1}
.cliente-nombre{font-size:15px;font-weight:800;letter-spacing:-.01em}
.cliente-razon{font-size:12px;color:#aaa;font-weight:500;margin-top:2px}
.cliente-datos{display:flex;flex-direction:column;gap:5px;font-size:13px;color:#666}
.cliente-dato{display:flex;align-items:center;gap:7px}
.cliente-dato span:first-child{font-size:14px}
.cliente-footer{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid #f5f5f5;margin-top:4px}
.cliente-vendedor{font-size:11px;color:#aaa;font-weight:600;background:#f5f5f5;padding:4px 10px;border-radius:99px}

/* PEDIDOS */
.pedidos-tabs{display:flex;gap:8px;flex-wrap:wrap}
.pedidos-tab{padding:9px 20px;border-radius:99px;border:2px solid #e8e8e8;background:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:7px}
.pedidos-tab:hover{border-color:#aaa}
.pedidos-tab.active-tab{background:#111;border-color:#111;color:#fff}
.pedidos-tab.nuevos.active-tab{background:#6c47ff;border-color:#6c47ff}
.pedidos-tab.preparando.active-tab{background:#f59e0b;border-color:#f59e0b}
.pedidos-tab.listos.active-tab{background:#00b341;border-color:#00b341}
.tab-n-badge{font-size:11px;padding:2px 8px;border-radius:99px;background:rgba(255,255,255,.2)}
.pedidos-tab:not(.active-tab) .tab-n-badge{background:#f0f0f0;color:#888}
.pedido-card{background:#fff;border-radius:14px;border:2px solid #f0f0f0;padding:20px;display:flex;flex-direction:column;gap:14px;animation:fadeUp .2s ease;transition:border-color .15s}
.pedido-card:hover{border-color:#e0e0e0}
.pedido-card.nuevo{border-left:4px solid #6c47ff}
.pedido-card.preparando{border-left:4px solid #f59e0b}
.pedido-card.listo{border-left:4px solid #00b341}
.pedido-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.pedido-cliente-info{display:flex;flex-direction:column;gap:3px}
.pedido-nombre{font-size:17px;font-weight:800;letter-spacing:-.01em}
.pedido-meta{font-size:12px;color:#aaa;font-weight:600}
.estado-badge{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:99px;font-size:12px;font-weight:700;flex-shrink:0}
.estado-badge.nuevo{background:#f0ebff;color:#6c47ff}
.estado-badge.preparando{background:#fffbeb;color:#b45309}
.estado-badge.listo{background:#e8fdf0;color:#00b341}
.pedido-items{background:#f9f9f9;border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;gap:6px}
.pedido-item-row{display:flex;justify-content:space-between;align-items:center;font-size:13px}
.pedido-item-name{color:#555;font-weight:500}
.pedido-item-price{font-weight:700;color:#111}
.pedido-footer{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid #f0f0f0;flex-wrap:wrap;gap:8px}
.pedido-fecha{font-size:11px;color:#bbb;font-weight:600}
.pedido-total{font-size:20px;font-weight:900;letter-spacing:-.02em}
.btn-pdf{padding:8px 16px;border-radius:8px;border:2px solid #e8e8e8;background:#fff;color:#555;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.btn-pdf:hover{border-color:#111;color:#111}
.btn-estado{padding:8px 14px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-preparar{background:#fffbeb;color:#b45309;border:2px solid #fde68a}
.btn-preparar:hover{background:#fef3c7}
.btn-listo{background:#e8fdf0;color:#00b341;border:2px solid #bbf7d0}
.btn-listo:hover{background:#d1fae5}

/* ESTADÍSTICAS */
.stat-big{background:#fff;border-radius:14px;border:2px solid #f0f0f0;padding:20px 24px;flex:1;min-width:140px}
.stat-big-num{font-size:32px;font-weight:900;letter-spacing:-.03em}
.stat-big-label{font-size:11px;color:#aaa;font-weight:600;margin-top:4px;letter-spacing:.04em}
.chart-bar-wrap{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.chart-row{display:flex;align-items:center;gap:10px;font-size:13px}
.chart-label{min-width:120px;color:#888;font-weight:500;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chart-bar-bg{flex:1;height:10px;background:#f5f5f5;border-radius:99px;overflow:hidden}
.chart-bar-fill{height:100%;border-radius:99px;background:#6c47ff;transition:width .5s ease}
.chart-val{min-width:55px;text-align:right;font-weight:700;font-size:12px}

/* EMPTY */
.empty{grid-column:1/-1;background:#fff;border-radius:14px;border:2px dashed #e8e8e8;padding:60px 24px;text-align:center}
.empty .icon{font-size:44px;opacity:.2;margin-bottom:14px}
.empty h3{font-size:18px;font-weight:700;margin-bottom:6px}
.empty p{font-size:14px;color:#bbb}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:#fff;border-radius:18px;width:100%;max-width:560px;display:flex;flex-direction:column;max-height:92vh;overflow:hidden;animation:modalIn .18s ease;box-shadow:0 24px 80px rgba(0,0,0,.2)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid #f0f0f0}
.modal-hdr h2{font-size:18px;font-weight:800;letter-spacing:-.02em}
.btn-close{width:32px;height:32px;border-radius:8px;border:none;background:#f5f5f5;cursor:pointer;font-size:16px;transition:background .15s}
.btn-close:hover{background:#eee}
.modal-body{padding:24px;overflow-y:auto;display:flex;flex-direction:column;gap:16px}
.modal-ftr{padding:16px 24px;border-top:1px solid #f0f0f0;display:flex;gap:10px;justify-content:flex-end}
.btn-cancel{padding:11px 18px;border-radius:10px;border:2px solid #e8e8e8;background:#fff;color:#555;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-cancel:hover{border-color:#aaa;color:#111}
.btn-submit{padding:11px 22px;border-radius:10px;border:none;background:#111;color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn-submit:hover{opacity:.85}

/* FOTO */
.photo-zone{border:2px dashed #e0e0e0;border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .15s;position:relative;background:#fafafa}
.photo-zone:hover{border-color:#aaa}
.photo-preview{width:100%;height:200px;object-fit:contain;display:none}
.photo-preview.show{display:block}
.photo-placeholder{height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.photo-placeholder .icon{font-size:36px;opacity:.3}
.photo-placeholder h3{font-size:15px;font-weight:700;color:#999}
.photo-placeholder p{font-size:12px;color:#bbb}
.photo-change{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.photo-zone:hover .photo-change.show{opacity:1}
.photo-change span{color:#fff;font-size:13px;font-weight:700}
input[type=file]{display:none}

/* FIELDS */
.field{display:flex;flex-direction:column;gap:7px}
.field label{font-size:12px;font-weight:700;color:#888;letter-spacing:.04em}
.field label em{color:#ff3b3b;font-style:normal}
.field input,.field textarea,.field select{width:100%;padding:11px 14px;border-radius:10px;border:2px solid #e8e8e8;background:#fff;font-size:15px;font-family:'Inter',sans-serif;color:#111;outline:none;transition:border-color .15s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:#111}
.field input.err,.field select.err{border-color:#ff3b3b}
.field textarea{resize:vertical;min-height:80px}
.err-msg{font-size:12px;color:#ff3b3b;font-weight:600}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.price-wrap{position:relative}
.price-sym{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;color:#bbb;font-weight:600;pointer-events:none}
.price-wrap input{padding-left:26px}

/* IMPORT */
.import-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:1001;padding:16px}
.import-modal{background:#fff;border-radius:18px;width:100%;max-width:520px;display:flex;flex-direction:column;max-height:90vh;overflow:hidden;animation:modalIn .18s ease;box-shadow:0 24px 80px rgba(0,0,0,.2)}
.import-drop-zone{border:2px dashed #e0e0e0;border-radius:12px;padding:36px 24px;text-align:center;cursor:pointer;transition:all .2s;background:#fafafa;margin-bottom:4px}
.import-drop-zone:hover,.import-drop-zone.dragover{border-color:#6c47ff;background:#f5f0ff}
.import-drop-zone .dz-icon{font-size:40px;opacity:.35;margin-bottom:10px}
.import-drop-zone h3{font-size:15px;font-weight:700;color:#555;margin-bottom:5px}
.import-drop-zone p{font-size:12px;color:#bbb}
.import-progress-wrap{margin-top:12px}
.import-progress-bar-bg{height:8px;background:#f0f0f0;border-radius:99px;overflow:hidden;margin-bottom:8px}
.import-progress-bar{height:100%;background:#6c47ff;border-radius:99px;transition:width .2s ease;width:0%}
.import-log{max-height:180px;overflow-y:auto;font-size:12px;font-family:monospace;background:#f9f9f9;border-radius:10px;padding:10px 12px;display:flex;flex-direction:column;gap:3px}
.import-log-item{padding:2px 0}
.import-log-item.ok{color:#00b341}
.import-log-item.err{color:#ff3b3b}
.import-log-item.info{color:#888}
.import-summary{background:#f0fdf4;border:2px solid #bbf7d0;border-radius:10px;padding:12px 16px;font-size:13px;font-weight:600;color:#166534;margin-top:8px;display:none}
.import-summary.show{display:block}

#toast{position:fixed;bottom:22px;right:22px;background:#111;color:#fff;border-radius:12px;padding:12px 20px;font-size:14px;font-weight:600;display:none;z-index:9999;animation:fadeUp .2s ease;box-shadow:0 8px 32px rgba(0,0,0,.18)}

/* CONFIG FIREBASE */
.config-box{background:#fff;border-radius:14px;border:2px solid #f0f0f0;padding:24px;display:flex;flex-direction:column;gap:16px}
.config-box h3{font-size:15px;font-weight:800;letter-spacing:-.01em}
.config-box p{font-size:13px;color:#888;line-height:1.6}
.config-box textarea{width:100%;padding:12px 14px;border-radius:10px;border:2px solid #e8e8e8;font-size:13px;font-family:monospace;color:#111;outline:none;min-height:140px;resize:vertical;transition:border-color .15s}
.config-box textarea:focus{border-color:#111}
.badge-aviso{display:inline-flex;align-items:center;gap:6px;background:#fffbeb;color:#b45309;border:1px solid #fde68a;padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600}

@media(max-width:768px){
  #app{flex-direction:column;height:auto;min-height:100vh}
  aside{width:100%;border-right:none;border-bottom:1px solid #ebebeb;flex-direction:row;flex-wrap:wrap;padding-bottom:8px}
  .brand{padding:14px 16px 10px}
  nav{flex-direction:row;flex-wrap:wrap;padding:0 8px 8px;gap:4px}
  .nav-item{padding:7px 10px;font-size:12px;flex:0 0 auto;border-radius:8px}
  .nav-item .nav-n{display:none}
  .sidebar-label,.sidebar-divider,.sidebar-footer{display:none}
  main{flex:1;overflow-y:auto}
  .page{padding:16px}
  .stats-row{gap:8px}
  .stat-card{padding:12px 14px;min-width:80px}
  .stat-num{font-size:22px}
  .grid,.clientes-grid{grid-template-columns:1fr}
  .card-img-wrap{height:140px}
  .field-row{grid-template-columns:1fr}
  .pedido-hdr{flex-direction:column}
  .pedidos-tabs{flex-wrap:wrap}
  .modal{max-height:98vh;margin:4px}
}
@media(max-width:420px){
  .brand-name{font-size:12px}
  .nav-item{font-size:11px;padding:6px 8px}
}
</style>
</head>
<body>
<div id="app-loader"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div></div>
<div id="app">
  <aside>
    <div class="brand">
      <div style="width:40px;height:40px;background:#111;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">🍬</div>
      <div class="brand-info">
        <div class="brand-name">Distribuidora</div>
        <div class="brand-sub">Panel Admin</div>
      </div>

function loadDB() {

function toast(msg) {

const CATS = [
  {id:'todos',      label:'Todos',      icon:'◈'},
  {id:'gomitas',    label:'Gomitas',    icon:'🐻'},

  {id:'snacks',     label:'Snacks',     icon:'🍿'},

let S = { seccion:'productos', cat:'todos', search:'', confirmDel:{}, editingProd:null, editingCliente:null };
let photoB64 = '';

let _importing = false;

// ── SIDEBAR ──

}

function setSeccion(sec, cat='todos') {
  S.seccion = sec;
  S.cat = cat;
  S.search = '';
  S.confirmDel = {};
  if (sec==='pedidos') { cargarPedidos().then(()=>{ renderSidebar(); renderPedidos(); }); return; }
  if (sec==='estadisticas') { cargarPedidos().then(()=>{ renderEstadisticas(); }); renderSidebar(); return; }
  renderSidebar();
  renderPage();
}

function renderPage() {
  if (S.seccion==='pedidos') { renderPedidos(); return; }
  if (S.seccion==='clientes') { renderClientes(); return; }
  if (S.seccion==='estadisticas') { renderEstadisticas(); return; }
  if (S.seccion==='config') { renderConfig(); return; }
  renderProductos();
}

// ── FIREBASE HELPERS ──
async function cargarPedidos() {
  try {
    if (!firebaseOK) throw new Error('sin firebase');
    const snap = await dbFS.collection('pedidos').orderBy('fecha','desc').get();
    _pedidosCache = snap.docs.map(d=>({id:d.id,...d.data()}));
  } catch(e) {
    try { _pedidosCache = JSON.parse(localStorage.getItem('golosinas_pedidos')||'[]'); } catch(e2){ _pedidosCache=[]; }
  }
}

async function guardarProductoFirebase(p) {
  if (!firebaseOK) return;
  try {
    await dbFS.collection('productos').doc(p.id).set({
      nombre:p.nombre||'', cat:p.cat||'', marca:p.marca||'',
      precio:p.precio||0, unidad:p.unidad||'', detalle:p.detalle||'',
      foto:p.foto||'', creadoEn:p.creadoEn||new Date().toISOString()
    });
  } catch(e){ console.warn('Error Firebase producto:', e); }
}

async function eliminarProductoFirebase(id) {
  if (!firebaseOK) return;
  try { await dbFS.collection('productos').doc(id).delete(); } catch(e){}
}

async function guardarClienteFirebase(c) {
  if (!firebaseOK) return;
  try {
    await dbFS.collection('clientes').doc(c.id).set({
      nombre:c.nombre||'', contacto:c.contacto||'', telefono:c.telefono||'',
      direccion:c.direccion||'', vendedor:c.vendedor||'', notas:c.notas||'',
      creadoEn:c.creadoEn||new Date().toISOString()
    });
  } catch(e){ console.warn('Error Firebase cliente:', e); }
}

async function eliminarClienteFirebase(id) {
  if (!firebaseOK) return;
  try { await dbFS.collection('clientes').doc(id).delete(); } catch(e){}
}

async function actualizarEstadoPedido(id, estado) {
  try {
    if (firebaseOK) await dbFS.collection('pedidos').doc(id).update({estado});
    const p = _pedidosCache.find(x=>x.id===id);
    if (p) p.estado = estado;
    renderPedidos();
    renderSidebar();
    toast(`✓ Pedido marcado como "${estado}"`);
  } catch(e){ toast('Error al actualizar estado'); }
}

async function cargarProductosFirebase() {
  try {
    if (!firebaseOK) throw new Error('sin firebase');
    const snap = await dbFS.collection('productos').get();
    db.prods = snap.docs.map(d=>({id:d.id,...d.data()}));
    db.prods.sort((a,b)=>(b.creadoEn||'').localeCompare(a.creadoEn||''));
  } catch(e) { db = loadDB(); }
  try {
    if (!firebaseOK) throw new Error('sin firebase');
    const snap = await dbFS.collection('clientes').get();
    db.clientes = snap.docs.map(d=>({id:d.id,...d.data()}));
  } catch(e) { if (!db.clientes) db.clientes = []; }
}

// ── PRODUCTOS ──
function renderProductos() {
  let list = db.prods;
  if (S.cat!=='todos') list = list.filter(p=>p.cat===S.cat);
  const q = S.search.toLowerCase();
  const filtered = q ? list.filter(p=>(p.nombre+p.marca+p.detalle).toLowerCase().includes(q)) : list;
  const total = db.prods.length;
  const conFoto = db.prods.filter(p=>p.foto).length;
  const sec = CATS.find(c=>c.id===S.cat);

  document.getElementById('page').innerHTML = `
    <div class="page-hdr">
      <div class="page-title-group">
        <h1>${sec.icon} ${sec.label}</h1>
        <p>${filtered.length} de ${list.length} producto${list.length!==1?'s':''}</p>
      </div>
      <div class="hdr-actions">
        <button class="btn-export" onclick="descargarPlantillaCSV()">⬇ Plantilla CSV</button>
        <button class="btn-import" onclick="openImportModal()">📥 Importar CSV</button>
        <button class="btn-export" onclick="exportProductos()">⬇ Exportar</button>
        <button class="btn-new" onclick="openModal()">+ Nuevo Producto</button>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">TOTAL</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#00b341">${conFoto}</div><div class="stat-label">CON FOTO</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#ff3b3b">${total-conFoto}</div><div class="stat-label">SIN FOTO</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#6c47ff">${CATS.filter(c=>c.id!=='todos').filter(c=>db.prods.some(p=>p.cat===c.id)).length}</div><div class="stat-label">CATEGORÍAS</div></div>
    </div>
    <div class="search-row">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" placeholder="Buscar por nombre, marca..." value="${S.search}" oninput="S.search=this.value;renderProductos()">
        ${S.search?`<button class="sc" onclick="S.search='';renderProductos()">✕</button>`:''}
      </div>
    </div>
    ${filtered.length===0
      ? `<div class="grid"><div class="empty"><div class="icon">${sec.icon}</div><h3>${S.search?'Sin resultados':'Sin productos'}</h3><p>${S.search?'No hay coincidencias':'Hacé clic en "+ Nuevo Producto" para empezar'}</p></div></div>`
      : `<div class="grid">${filtered.map(p=>renderCard(p)).join('')}</div>`
    }`;
}

function renderCard(p) {
  const cat = CATS.find(c=>c.id===p.cat);
  const isDel = S.confirmDel[p.id];
  const imgHtml = p.foto
    ? `<img class="card-img loaded" src="${p.foto}" alt=""><div class="card-overlay"><span>📷 CAMBIAR</span></div>`
    : `<div class="card-img-placeholder"><div class="icon">${cat?.icon||'📦'}</div><div class="txt">SIN FOTO</div></div>`;
  return `<div class="card">
    <div class="card-img-wrap" onclick="editProd('${p.id}')">${imgHtml}</div>
    <div class="card-body">
      <div class="card-row1">
        <div class="card-name">${p.nombre}</div>
        <div class="card-price">$${fmt(p.precio||0)}</div>
      </div>
      <div class="card-tags">
        ${p.marca?`<span class="tag">${p.marca}</span>`:''}
        ${p.unidad?`<span class="tag">${p.unidad}</span>`:''}
        <span class="tag">${cat?.label||p.cat}</span>
      </div>
      ${p.detalle?`<div class="card-desc">${p.detalle.substring(0,80)}${p.detalle.length>80?'…':''}</div>`:''}
      <div class="card-footer">
        <div class="card-id">ID: ${p.id.substring(0,8)}…</div>
        <div class="card-actions">
          <button class="btn-edit" onclick="editProd('${p.id}')">✎ Editar</button>
          <button class="btn-del${isDel?' confirm':''}" onclick="delProd('${p.id}')">
            ${isDel?'⚠ Confirmar':'✕'}
          </button>
        </div>
      </div>
    </div>
  </div>`;
}

let photoB64 = '';

function openModal(prod=null) {
  S.editingProd = prod?.id || null;

  document.getElementById('f-marca').value = prod?.marca || '';
  document.getElementById('f-precio').value = prod?.precio || '';
  document.getElementById('f-unidad').value = prod?.unidad || '';
  document.getElementById('f-detalle').value = prod?.detalle || '';
  togglePriceSym(String(prod?.precio ?? ''));
  updatePhotoUI();
  ['nombre','cat','precio'].forEach(f => {
    const e=document.getElementById('err-'+f); if(e) e.textContent='';
  });
  document.getElementById('overlay').style.display='flex';
  setTimeout(()=>document.getElementById('f-nombre').focus(),50);
}

function updatePhotoUI() {
  const prev=document.getElementById('photo-preview');
  const plac=document.getElementById('photo-placeholder');
  const chng=document.getElementById('photo-change');
  if (photoB64) { prev.src=photoB64; prev.classList.add('show'); plac.style.display='none'; chng.classList.add('show'); }
  else { prev.src=''; prev.classList.remove('show'); plac.style.display='flex'; chng.classList.remove('show'); }
}

function comprimirImagen(base64, size=800, quality=0.82) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const min = Math.min(img.width, img.height);
      const sx = (img.width-min)/2, sy = (img.height-min)/2;
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.fillRect(0,0,size,size);
      ctx.drawImage(img,sx,sy,min,min,0,0,size,size);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = base64;
  });
}

function onFile(e) {
  const file=e.target.files[0]; if(!file) return;
  if (file.size>10*1024*1024) { toast('La foto es muy grande. Máx 10MB'); return; }
  const r=new FileReader();
  r.onload=ev=>{
    comprimirImagen(ev.target.result).then(compressed => {
      photoB64=compressed; updatePhotoUI(); toast('✓ Foto cargada');
    });
  };
  r.readAsDataURL(file); e.target.value='';
}

function togglePriceSym(val) {
  const isNum = val.trim()===''||!isNaN(parseFloat(val.replace(/\./g,'').replace(/,/g,'.')));
  document.getElementById('price-sym').style.visibility = isNum?'visible':'hidden';
  document.getElementById('f-precio').style.paddingLeft = isNum?'26px':'14px';
}

function closeModal() { document.getElementById('overlay').style.display='none'; S.editingProd=null; photoB64=''; }

function submitProducto() {
  const nombre  = document.getElementById('f-nombre').value.trim();
  const cat     = document.getElementById('f-cat').value;
  const marca   = document.getElementById('f-marca').value.trim();
  const precio  = parseFloat(String(document.getElementById('f-precio').value).replace(/\./g,'').replace(/,/g,'.')) || 0;
  const unidad  = document.getElementById('f-unidad').value.trim();
  const detalle = document.getElementById('f-detalle').value.trim();
  let ok=true;
  const err=(f,m)=>{document.getElementById('err-'+f).textContent=m;ok=false};
  const clr=f=>{document.getElementById('err-'+f).textContent=''};
  !nombre?err('nombre','Requerido'):clr('nombre');
  !cat?err('cat','Requerido'):clr('cat');
  !precio?err('precio','Requerido'):clr('precio');
  if(!ok) return;
  const prod = {nombre,cat,marca,precio,unidad,detalle,foto:photoB64};
  if (S.editingProd) {
    const i=db.prods.findIndex(p=>p.id===S.editingProd);
    if(i!==-1){db.prods[i]={...db.prods[i],...prod};guardarProductoFirebase(db.prods[i]);}
    toast('✓ Producto actualizado');
  } else {
    prod.id=genId(); prod.creadoEn=new Date().toISOString();
    db.prods.push(prod); guardarProductoFirebase(prod);
    toast('✓ Producto agregado');
  }
  saveDB(); closeModal(); renderProductos(); renderSidebar();
}

function submitCliente() {
  const nombre    = document.getElementById('fc-nombre').value.trim();
  const contacto  = document.getElementById('fc-contacto').value.trim();
  const telefono  = document.getElementById('fc-telefono').value.trim();
  const vendedor  = document.getElementById('fc-vendedor').value.trim();
  const direccion = document.getElementById('fc-direccion').value.trim();
  const notas     = document.getElementById('fc-notas').value.trim();
  if (!nombre) { document.getElementById('err-fc-nombre').textContent='Requerido'; return; }
  if (!db.clientes) db.clientes = [];
  const cliente = {nombre,contacto,telefono,vendedor,direccion,notas};
  if (S.editingCliente) {
    const i=db.clientes.findIndex(c=>c.id===S.editingCliente);
    if(i!==-1){db.clientes[i]={...db.clientes[i],...cliente};guardarClienteFirebase(db.clientes[i]);}

    db.clientes.push(cliente); guardarClienteFirebase(cliente);

function exportClientes() {
  const clientes = db.clientes || [];

  const cab = 'nombre,contacto,telefono,vendedor,direccion,notas';

  const filas = clientes.map(c=>[esc(c.nombre),esc(c.contacto),esc(c.telefono),esc(c.vendedor),esc(c.direccion),esc(c.notas)].join(','));

function parseCSV(text) {
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2)return{headers:[],rows:[]};
  const sep=lines[0].includes(';')?';':',';
  const parseRow=row=>{
    const result=[];let inQuotes=false,cur='';
    for(let i=0;i<row.length;i++){
      const c=row[i];
      if(c==='"'){inQuotes=!inQuotes;}
      else if(c===sep&&!inQuotes){result.push(cur.trim());cur='';}
      else{cur+=c;}
    }
    result.push(cur.trim());
    return result;
  };
  const headers=parseRow(lines[0]).map(h=>h.toLowerCase().trim());
  const rows=lines.slice(1).map(l=>{
    const vals=parseRow(l);const obj={};
    headers.forEach((h,i)=>{obj[h]=vals[i]!==undefined?vals[i]:'';});
    return obj;
  });
  return{headers,rows};
}

async function handleImportFile(input) {
  const file=input.files[0]; if(!file) return;
  if(!file.name.toLowerCase().endsWith('.csv')){toast('⚠ Solo se aceptan archivos .csv');return;}
  document.getElementById('import-drop-zone').style.display='none';
  document.getElementById('import-progress-wrap').style.display='block';
  document.getElementById('import-log').innerHTML='';
  document.getElementById('import-summary').className='import-summary';
  const text=await file.text();
  const{headers,rows}=parseCSV(text);
  const required=['nombre','cat','precio'];
  const missing=required.filter(r=>!headers.includes(r));
  if(missing.length){addLog('✗ Columnas faltantes: '+missing.join(', '),'err');return;}
  const total=rows.filter(r=>r.nombre?.trim()).length;
  if(total===0){addLog('⚠ No se encontraron filas con datos.','err');return;}
  _importing=true;let ok=0,errores=0;
  addLog(`📋 ${total} producto${total!==1?'s':''} encontrado${total!==1?'s':''}...`,'info');
  for(let i=0;i<rows.length;i++){
    const row=rows[i];
    if(!row.nombre?.trim())continue;
    const pct=Math.round(((ok+errores+1)/total)*100);
    document.getElementById('import-progress-bar').style.width=pct+'%';
    const nombre=row.nombre.trim();
    const cat=row.cat?.trim().toLowerCase()||'otros';
    const marca=row.marca?.trim()||'';
    const precio=parseFloat(String(row.precio||'0').replace(/\$/g,'').replace(/\./g,'').replace(/,/g,'.'))||0;
    const unidad=row.unidad?.trim()||'';
    const detalle=row.detalle?.trim()||'';
    const normalizar=s=>String(s||'').trim().toLowerCase();
    const existente=db.prods.find(p=>normalizar(p.nombre)===normalizar(nombre));
    const prod=existente?{...existente,cat,marca,precio,unidad,detalle}:{id:genId(),nombre,cat,marca,precio,unidad,detalle,foto:'',creadoEn:new Date().toISOString()};
    try{
      await guardarProductoFirebase(prod);
      if(existente){const idx=db.prods.findIndex(p=>p.id===existente.id);db.prods[idx]=prod;addLog(`↻ "${nombre}" actualizado — $${fmt(precio)}`,'ok');}
      else{db.prods.push(prod);addLog(`✓ "${nombre}" agregado — $${fmt(precio)}`,'ok');}
      saveDB();ok++;
    }catch(e){addLog(`✗ "${nombre}": error al guardar`,'err');errores++;}
    await new Promise(r=>setTimeout(r,20));
  }
  _importing=false;
  document.getElementById('import-progress-bar').style.width='100%';
  const sumEl=document.getElementById('import-summary');
  sumEl.innerHTML=`✅ <strong>${ok}</strong> producto${ok!==1?'s':''} importado${ok!==1?'s':''}${errores>0?` · <span style="color:#b91c1c">⚠ ${errores} con error</span>`:''}`;
  sumEl.className='import-summary show';
  renderSidebar();renderProductos();
  toast(`✓ ${ok} producto${ok!==1?'s':''} importado${ok!==1?'s':''}`);
}

function exportProductos() {
  if(!db.prods.length){toast('⚠ No hay productos para exportar');return;}
  const cab='nombre,cat,marca,precio,unidad,detalle';
  const esc=v=>(String(v||'').includes(',')||String(v||'').includes('"'))?'"'+String(v||'').replace(/"/g,'""')+'"':String(v||'');
  const filas=db.prods.map(p=>[esc(p.nombre),esc(p.cat),esc(p.marca),esc(p.precio),esc(p.unidad),esc(p.detalle)].join(','));
  const csv=[cab,...filas].join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='productos_golosinas.csv';a.click();
  toast('✓ Exportado como CSV');
}

// ── DRAG & DROP FOTO ──
window.addEventListener('DOMContentLoaded',()=>{
  const z=document.getElementById('photo-zone');
  if(!z)return;
  z.addEventListener('dragover',e=>{e.preventDefault();z.style.borderColor='#111'});
  z.addEventListener('dragleave',()=>z.style.borderColor='');
  z.addEventListener('drop',e=>{
    e.preventDefault();z.style.borderColor='';
    const file=e.dataTransfer.files[0];
    if(file?.type.startsWith('image/'))onFile({target:{files:[file],value:''}});
  });
  const dz=document.getElementById('import-drop-zone');
  if(!dz)return;
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover');});
  dz.addEventListener('dragleave',()=>dz.classList.remove('dragover'));
  dz.addEventListener('drop',e=>{
    e.preventDefault();dz.classList.remove('dragover');
    const file=e.dataTransfer.files[0];
    if(file)handleImportFile({files:[file]});
  });
});

async function init() {
  await cargarProductosFirebase();
  await cargarPedidos();
  renderSidebar();
  renderPedidos();
  const loader=document.getElementById('app-loader');
  if(loader){loader.classList.add('hide');setTimeout(()=>loader.remove(),350);}
}
init();
</script>
